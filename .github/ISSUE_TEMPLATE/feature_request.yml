name: Feature request
description: Propose an improvement or new capability.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do (or do comfortably) today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What should it look like? API sketches welcome — note that the docs site is
        the API contract, so describe the docs page you'd expect to read.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using now, or why existing escape hatches don't fit.
    validations:
      required: false
