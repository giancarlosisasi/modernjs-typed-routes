name: Release

# Changesets flow: pushes to main with pending changesets open/update a
# "Version Packages" PR. Publishing only happens when the MAINTAINER merges
# that PR (owner-gated by design).
#
# Auth: npm TRUSTED PUBLISHING (OIDC) — no npm token anywhere. The npm-side
# publisher config pins this repo + release.yml + the "Production" GitHub
# environment, so the job MUST declare that environment (case-sensitive).
# Provenance is generated automatically by npm on OIDC publishes.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for OIDC trusted publishing

concurrency: release-main

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Production # must match the npm trusted-publisher config
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # NO registry-url here: setup-node would write an .npmrc with
      # _authToken=${NODE_AUTH_TOKEN}, and with that env unset (OIDC — no
      # token) EVERY npm command dies with "Failed to replace env in config".
      # npm defaults to registry.npmjs.org; OIDC needs no .npmrc at all.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Trusted publishing needs npm >= 11.5.1; Node 22's bundled npm is older.
      # Pinned to the npm 11 line: npm 12 wraps `info --json` output in an
      # array and reshapes error JSON, which changesets 2.31 can't parse
      # (it then re-publishes existing versions and crashes on the E403).
      - name: Update npm for OIDC support
        run: npm install -g npm@11 && npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
