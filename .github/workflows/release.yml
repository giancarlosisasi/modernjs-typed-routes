name: Release

# Changesets flow: pushes to main with pending changesets open/update a
# "Version Packages" PR. Publishing only happens when the MAINTAINER merges
# that PR (owner-gated by design) — then `pnpm release` runs with npm
# provenance. Requires the NPM_TOKEN repo secret (maintainer sets it).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-main

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance attestation (id-token: write). Set here, not in
          # publishConfig, so a manual local `npm publish` still works.
          NPM_CONFIG_PROVENANCE: 'true'
