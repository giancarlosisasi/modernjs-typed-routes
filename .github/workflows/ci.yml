name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        # The author develops on Windows; users are everywhere.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned pnpm version from package.json's "packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint (Biome, read-only)
        run: pnpm exec biome ci .

      - name: Unit + type-level + docs snippets + playground typecheck
        run: pnpm test

      # Real Modern.js CLI over examples/playground. Serial and generous with
      # timeouts by design; retries once in CI (rstest.e2e.config.ts).
      - name: E2E (real Modern.js CLI)
        run: pnpm test:e2e
        timeout-minutes: 20

      - name: Package lint (publint + attw)
        run: pnpm lint:package

      - name: Docs build
        run: pnpm docs:build
